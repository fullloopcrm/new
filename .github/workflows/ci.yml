name: CI

# The machine enforces the gates so no single dev can merge a regression:
# type errors, failing tests, or a NEW cross-tenant query all block the PR.
on:
  push:
    branches: [main]
  pull_request:

# Least privilege: every job here only reads the checkout and runs Node
# tooling — none of them need write scopes on the repo, packages, or actions.
# Default GITHUB_TOKEN is read-only for the checkout; nothing is granted more.
permissions:
  contents: read

# One in-flight run per ref; a newer push to the same PR cancels the older run
# so we don't burn runner minutes type-checking a commit that's already stale.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: platform

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      failed_step: ${{ steps.identify-failed-step.outputs.failed_step }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        id: checkout
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        id: setup-node
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: platform/package-lock.json

      - name: Install dependencies
        id: install
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        id: typecheck
        run: npx tsc --noEmit --pretty false

      - name: Unit tests (vitest)
        id: test
        run: npx vitest run

      - name: Tenant-isolation guard
        id: tenant-scope
        # Fails on ANY unscoped query on a tenant-owned table without .eq('tenant_id', …).
        # Baseline was driven to zero (scripts/.tenant-scope-baseline.json = []) — no
        # grandfathered debt. Any remaining unscoped query is a real gate failure until
        # fixed with .eq('tenant_id', tenantId) or annotated `// tenant-scope-ok: <reason>`.
        #
        # Item (247), continuing (246)'s surface: audit-tenant-scope.mjs's own exit 1 is
        # ambiguous between two causes -- new unscoped queries found (a real leak) or an
        # uncaught exception in the script itself (a bad regex, a grep failure other than
        # "no matches", a corrupt baseline JSON file) -- the identical "two reasons for
        # exit 1" shape (246) closed for tenant-config-reconcile.yml's own drift-gate
        # step. Piped through tee so identify-failed-step below can grep the captured
        # output for the script's own "✗ tenant-scope guard:" finding-report line as the
        # real-leak-vs-crash signal, mirroring reconcile-tenant-config.mjs's summarize()
        # header check. PIPESTATUS[0] preserves the real node exit code through the tee
        # pipe so this step still fails on a real leak.
        shell: bash
        run: |
          set +e
          node scripts/audit-tenant-scope.mjs | tee tenant-scope-output.txt
          exit_code=${PIPESTATUS[0]}
          exit "$exit_code"

      - name: Protected-tenant guard
        id: protected-tenant
        # The backstop for the 2026-07-08 outage class (a merge silently dropping a
        # live tenant's BESPOKE_SITE_TENANTS entry or its /site/<slug> folder, so it
        # falls back to the generic template with no error). Runs automatically as
        # npm's `prebuild` step ahead of `next build`, but this repo's own CI never
        # calls `next build` (no vitest/tsc/eslint check reads BESPOKE_SITE_TENANTS
        # or the site folders), so the break was previously invisible until Vercel's
        # own build ran prebuild post-merge on main. Run it directly here so a PR
        # that breaks a protected tenant is red BEFORE merge, not caught by whichever
        # deploy happens to run next.
        #
        # Item (247): verify-protected-tenants.mjs's own exit 1 is ambiguous the same
        # way -- a real PROTECTED-tenant violation, or an uncaught exception in the
        # script itself before it ever gets to report one (main() here is a bare
        # synchronous call with no try/catch of its own, so a thrown error falls
        # straight through to Node's default uncaught-exception exit 1). Piped through
        # tee so identify-failed-step below can grep for the script's own
        # "PROTECTED-TENANT GUARD FAILED" banner as the real-violation-vs-crash signal.
        shell: bash
        run: |
          set +e
          node scripts/verify-protected-tenants.mjs | tee protected-tenant-output.txt
          exit_code=${PIPESTATUS[0]}
          exit "$exit_code"

      - name: Lint
        id: lint
        # Blocking: `eslint src --quiet` is error-clean today (verified 2026-07-04),
        # so this catches any NEW eslint error. Warnings are suppressed by --quiet.
        run: npx eslint src --quiet

      - name: Identify which step failed (for the Telegram alert)
        id: identify-failed-step
        if: failure()
        run: |
          # Item (244): every prior step above has an `id:` so its `outcome` is
          # readable here, but the failing one was previously invisible to whoever
          # got paged — the Telegram alert (below, in notify-failure) said only
          # "CI failed", forcing a log dive through up to 8 steps (checkout,
          # setup-node, install, typecheck, test, tenant-scope, protected-tenant,
          # lint) before learning which one actually broke. `steps.<id>.outcome`
          # is only readable from WITHIN this job, not from notify-failure (a
          # separate job, wired via `needs:`) — so this step runs here, checks
          # each prior step's outcome explicitly (GitHub Actions expressions can't
          # be parameterized by a shell variable, so each check is spelled out
          # rather than looped), and publishes the first failed one as a job
          # `output` notify-failure reads via `needs.verify.outputs.failed_step`.
          # Named with "Telegram" so ci-gate-conditional-skip-guard.test.ts's
          # ALERT_STEP_NAME_RE exemption (a gating step may not carry an `if:`,
          # on pain of silently reporting "skipped" instead of "failure" under
          # branch protection) applies to this step too — it exists only to
          # enrich the alert, and skips cleanly when nothing failed.
          failed="unknown"
          [ "${{ steps.checkout.outcome }}" = "failure" ] && failed="Checkout"
          [ "${{ steps.setup-node.outcome }}" = "failure" ] && failed="Setup Node"
          [ "${{ steps.install.outcome }}" = "failure" ] && failed="Install dependencies"
          [ "${{ steps.typecheck.outcome }}" = "failure" ] && failed="Typecheck (tsc --noEmit)"
          [ "${{ steps.test.outcome }}" = "failure" ] && failed="Unit tests (vitest)"

          # Item (247): naming the failing STEP wasn't enough for these two --
          # each one's own exit 1 means EITHER a real gate finding OR the script
          # itself crashing before it ever produced one (see the comment above
          # each step). grep the captured tee output for the script's own report
          # banner as the disambiguating signal, same technique (246) used for
          # the sibling tenant-config-reconcile.yml drift-gate step.
          if [ "${{ steps.tenant-scope.outcome }}" = "failure" ]; then
            if grep -q '✗ tenant-scope guard:' tenant-scope-output.txt 2>/dev/null; then
              failed="Tenant-isolation guard -- new unscoped quer(y/ies) found (not a script error; see the run log for which file/line)"
            else
              failed="Tenant-isolation guard -- the script itself errored before producing a report (not a real leak -- see the run log)"
            fi
          fi
          if [ "${{ steps.protected-tenant.outcome }}" = "failure" ]; then
            if grep -q 'PROTECTED-TENANT GUARD FAILED' protected-tenant-output.txt 2>/dev/null; then
              failed="Protected-tenant guard -- a live tenant would lose its site (not a script error; see the run log for which tenant)"
            else
              failed="Protected-tenant guard -- the script itself errored before producing a report (not a real tenant break -- see the run log)"
            fi
          fi
          [ "${{ steps.lint.outcome }}" = "failure" ] && failed="Lint"
          echo "failed_step=$failed" >> "$GITHUB_OUTPUT"

  notify-failure:
    needs: verify
    if: failure()
    runs-on: ubuntu-latest
    # No long-running step here (one curl call), but the call reaches a
    # third-party API (api.telegram.org) with no bound of its own — see the
    # --max-time flag below. Without EITHER bound, a network hang here would
    # sit on the runner up to GitHub's 360-minute default job timeout instead
    # of failing fast.
    timeout-minutes: 5
    steps:
      - name: Telegram alert on CI failure
        working-directory: ${{ github.workspace }}
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ]; then
            echo "TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID not set — skipping alert."
            exit 0
          fi
          TEXT="❌ CI failed — ${{ github.workflow }}
          failed step: ${{ needs.verify.outputs.failed_step }}
          branch: ${{ github.ref_name }}
          commit: ${{ github.sha }}
          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s --max-time 30 -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            --data-urlencode text="$TEXT" \
            -d disable_web_page_preview=true >/dev/null || true
