name: CI

# The machine enforces the gates so no single dev can merge a regression:
# type errors, failing tests, or a NEW cross-tenant query all block the PR.
on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: platform

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: platform/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npx tsc --noEmit --pretty false

      - name: Unit tests (vitest)
        run: npx vitest run

      - name: Tenant-isolation guard
        # Fails if a NEW tenant-owned query is added without .eq('tenant_id', …).
        # The 91 baselined legacy candidates are triaged separately; new leaks can't merge.
        run: node scripts/audit-tenant-scope.mjs

      - name: supabaseAdmin-gate guard
        # Fails if a NEW route file calls supabaseAdmin without a tenant/permission
        # gate (requirePermission/tenantDb/etc) — the bug shape behind nearly every
        # cross-tenant IDOR fixed across this project. 72 baselined legacy routes
        # are triaged separately; new ungated routes can't merge.
        run: node scripts/audit-supabase-admin-gate.mjs

      - name: Lint
        # Blocking: `eslint src --quiet` is error-clean today (verified 2026-07-04),
        # so this catches any NEW eslint error. Warnings are suppressed by --quiet.
        run: npx eslint src --quiet

  notify-failure:
    needs: verify
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Telegram alert on CI failure
        working-directory: ${{ github.workspace }}
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ]; then
            echo "TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID not set — skipping alert."
            exit 0
          fi
          TEXT="❌ CI failed — ${{ github.workflow }}
          branch: ${{ github.ref_name }}
          commit: ${{ github.sha }}
          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            --data-urlencode text="$TEXT" \
            -d disable_web_page_preview=true >/dev/null || true
