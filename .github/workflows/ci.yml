name: CI

# The machine enforces the gates so no single dev can merge a regression:
# type errors, failing tests, or a NEW cross-tenant query all block the PR.
on:
  push:
    branches: [main]
  pull_request:

# Least privilege: every job here only reads the checkout and runs Node
# tooling — none of them need write scopes on the repo, packages, or actions.
# Default GITHUB_TOKEN is read-only for the checkout; nothing is granted more.
permissions:
  contents: read

# One in-flight run per ref; a newer push to the same PR cancels the older run
# so we don't burn runner minutes type-checking a commit that's already stale.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: platform

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: platform/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npx tsc --noEmit --pretty false

      - name: Unit tests (vitest)
        run: npx vitest run

      - name: Tenant-isolation guard
        # Fails on ANY unscoped query on a tenant-owned table without .eq('tenant_id', …).
        # Baseline was driven to zero (scripts/.tenant-scope-baseline.json = []) — no
        # grandfathered debt. Any remaining unscoped query is a real gate failure until
        # fixed with .eq('tenant_id', tenantId) or annotated `// tenant-scope-ok: <reason>`.
        run: node scripts/audit-tenant-scope.mjs

      - name: Protected-tenant guard
        # The backstop for the 2026-07-08 outage class (a merge silently dropping a
        # live tenant's BESPOKE_SITE_TENANTS entry or its /site/<slug> folder, so it
        # falls back to the generic template with no error). Runs automatically as
        # npm's `prebuild` step ahead of `next build`, but this repo's own CI never
        # calls `next build` (no vitest/tsc/eslint check reads BESPOKE_SITE_TENANTS
        # or the site folders), so the break was previously invisible until Vercel's
        # own build ran prebuild post-merge on main. Run it directly here so a PR
        # that breaks a protected tenant is red BEFORE merge, not caught by whichever
        # deploy happens to run next.
        run: node scripts/verify-protected-tenants.mjs

      - name: Lint
        # Blocking: `eslint src --quiet` is error-clean today (verified 2026-07-04),
        # so this catches any NEW eslint error. Warnings are suppressed by --quiet.
        run: npx eslint src --quiet

  notify-failure:
    needs: verify
    if: failure()
    runs-on: ubuntu-latest
    # No long-running step here (one curl call), but the call reaches a
    # third-party API (api.telegram.org) with no bound of its own — see the
    # --max-time flag below. Without EITHER bound, a network hang here would
    # sit on the runner up to GitHub's 360-minute default job timeout instead
    # of failing fast.
    timeout-minutes: 5
    steps:
      - name: Telegram alert on CI failure
        working-directory: ${{ github.workspace }}
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ]; then
            echo "TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID not set — skipping alert."
            exit 0
          fi
          TEXT="❌ CI failed — ${{ github.workflow }}
          branch: ${{ github.ref_name }}
          commit: ${{ github.sha }}
          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s --max-time 30 -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            --data-urlencode text="$TEXT" \
            -d disable_web_page_preview=true >/dev/null || true
