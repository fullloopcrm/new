name: Nightly DB Backup (offsite GitHub artifact)

# Full-platform Postgres backup for FullLoop. This dumps the ENTIRE Supabase
# database (every tenant's rows + the tenants config) and stores it as a GitHub
# artifact — GitHub is a different provider than Supabase, so the backup survives
# a Supabase loss/suspension/compromise. This is the "FL first" layer; per-tenant
# granular exports run separately in the app cron.
#
# Why a GitHub Action and not a Vercel cron: pg_dump needs a real Postgres
# client binary and minutes of runtime — neither exists in a serverless function.
#
# SECRETS REQUIRED (add in repo Settings → Secrets and variables → Actions):
#   SUPABASE_DB_URL        postgres://postgres:<db-password>@db.<ref>.supabase.co:5432/postgres
#                          (Supabase dashboard → Project Settings → Database → Connection string → URI)
#   (optional) TELEGRAM_BOT_TOKEN + TELEGRAM_NOTIFY_CHAT_ID  — failure ping
#
# No secret values live in this file. They stay in GitHub's encrypted store.
# Retention: artifacts keep 90 days (GitHub limit). Supabase PITR is the primary
# fast-recovery layer; add R2/S3 later for long-term retention (dump step unchanged).

on:
  schedule:
    - cron: '0 9 * * *'      # 09:00 UTC daily (~05:00 ET) — matches the app's nightly window
  workflow_dispatch: {}       # allow manual "Run workflow" for a test/restore-drill

# Least privilege: this job never checks out the repo and never calls the
# GitHub API with GITHUB_TOKEN (pg_dump auths via SUPABASE_DB_URL;
# upload-artifact uses its own internal token, not GITHUB_TOKEN) — so it
# needs zero scopes. Declared explicitly instead of falling back to the
# repo's default Actions permission setting, matching ci.yml/tenant-scope.yml/
# tenant-config-reconcile.yml's existing least-privilege pattern in this repo.
permissions: {}

concurrency:
  group: db-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Install latest pg_dump (client 17 — can dump any older server)
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Dump full database (custom format, compressed, restorable)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          STAMP="$(date -u +%Y-%m-%dT%H-%M-%SZ)"
          echo "STAMP=$STAMP" >> "$GITHUB_ENV"
          # -Fc custom format → restore with pg_restore. --no-owner/--no-privileges
          # so it restores cleanly into a fresh project.
          pg_dump "$SUPABASE_DB_URL" \
            --no-owner --no-privileges \
            -Fc -f "fullloop-$STAMP.dump"
          SIZE=$(stat -c%s "fullloop-$STAMP.dump")
          echo "Dump size: $SIZE bytes"
          # Sanity gate: a real dump is not tiny. Fail loudly if it is.
          if [ "$SIZE" -lt 100000 ]; then
            echo "::error::Dump suspiciously small ($SIZE bytes) — treating as failure"
            exit 1
          fi

      - name: Upload dump as GitHub artifact (offsite — different provider than Supabase)
        uses: actions/upload-artifact@v4
        with:
          name: fullloop-db-${{ env.STAMP }}
          path: fullloop-${{ env.STAMP }}.dump
          retention-days: 90
          if-no-files-found: error

      - name: Alert on failure (Telegram)
        if: failure() && env.TG_TOKEN != ''
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
        run: |
          curl -sS "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            -d text="🔴 FullLoop nightly DB backup FAILED — run: ${{ github.run_id }}. Check the Action log." || true
