name: Nightly DB Backup (offsite GitHub artifact)

# Full-platform Postgres backup for FullLoop. This dumps the ENTIRE Supabase
# database (every tenant's rows + the tenants config) and stores it as a GitHub
# artifact — GitHub is a different provider than Supabase, so the backup survives
# a Supabase loss/suspension/compromise. This is the "FL first" layer; per-tenant
# granular exports run separately in the app cron.
#
# Why a GitHub Action and not a Vercel cron: pg_dump needs a real Postgres
# client binary and minutes of runtime — neither exists in a serverless function.
#
# SECRETS REQUIRED (add in repo Settings → Secrets and variables → Actions):
#   SUPABASE_DB_URL        postgres://postgres:<db-password>@db.<ref>.supabase.co:5432/postgres
#                          (Supabase dashboard → Project Settings → Database → Connection string → URI)
#   BACKUP_ENCRYPTION_KEY  a long random passphrase (e.g. `openssl rand -base64 48`).
#                          REQUIRED, not optional — this repo (fullloopcrm/new) is PUBLIC, and
#                          GitHub Actions artifacts are downloadable by anyone with read access
#                          to the repo, which for a public repo means any GitHub account, not
#                          just collaborators. The dump contains every tenant's full data,
#                          including PINs/payroll/SSN-last4. The encrypt step below fails the
#                          job closed (refuses to upload) if this secret is unset, so a dump
#                          can never reach the public artifact store in plaintext.
#   (optional) TELEGRAM_BOT_TOKEN + TELEGRAM_CHAT_ID  — failure ping (shared with
#                          ci.yml / tenant-config-reconcile.yml's own alert steps —
#                          see item (196): this previously read TELEGRAM_NOTIFY_CHAT_ID,
#                          a secret that was never configured, silencing every alert)
#
# No secret values live in this file. They stay in GitHub's encrypted store.
# Retention: artifacts keep 90 days (GitHub limit). Supabase PITR is the primary
# fast-recovery layer; add R2/S3 later for long-term retention (dump step unchanged).
#
# To restore: gpg --batch --yes --passphrase-file <(echo "$BACKUP_ENCRYPTION_KEY") \
#   --decrypt -o fullloop.dump fullloop-<stamp>.dump.gpg && pg_restore ...

on:
  schedule:
    - cron: '0 9 * * *'      # 09:00 UTC daily (~05:00 ET) — matches the app's nightly window
  workflow_dispatch: {}       # allow manual "Run workflow" for a test/restore-drill

# Least privilege: this job never checks out the repo and never calls the
# GitHub API with GITHUB_TOKEN (pg_dump auths via SUPABASE_DB_URL;
# upload-artifact uses its own internal token, not GITHUB_TOKEN) — so it
# needs zero scopes. Declared explicitly instead of falling back to the
# repo's default Actions permission setting, matching ci.yml/
# tenant-config-reconcile.yml's existing least-privilege pattern in this repo.
# (tenant-scope.yml was a third match here until it was removed 2026-07-17 as
# a duplicate of ci.yml's own "Tenant-isolation guard" step.)
permissions: {}

concurrency:
  group: db-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Install latest pg_dump (client 17 — can dump any older server)
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL --max-time 30 https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Dump full database (custom format, compressed, restorable)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          STAMP="$(date -u +%Y-%m-%dT%H-%M-%SZ)"
          echo "STAMP=$STAMP" >> "$GITHUB_ENV"
          # -Fc custom format → restore with pg_restore. --no-owner/--no-privileges
          # so it restores cleanly into a fresh project.
          pg_dump "$SUPABASE_DB_URL" \
            --no-owner --no-privileges \
            -Fc -f "fullloop-$STAMP.dump"
          SIZE=$(stat -c%s "fullloop-$STAMP.dump")
          echo "Dump size: $SIZE bytes"
          # Sanity gate: a real dump is not tiny. Fail loudly if it is.
          if [ "$SIZE" -lt 100000 ]; then
            echo "::error::Dump suspiciously small ($SIZE bytes) — treating as failure"
            exit 1
          fi

      - name: Encrypt dump (this repo is PUBLIC — never upload plaintext PII)
        env:
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${BACKUP_ENCRYPTION_KEY}" ]; then
            echo "::error::BACKUP_ENCRYPTION_KEY secret is not configured. Refusing to upload an" \
                 "unencrypted full-database dump — this repo (fullloopcrm/new) is PUBLIC and" \
                 "GitHub Actions artifacts are downloadable by any GitHub account with read" \
                 "access to the repo. Add BACKUP_ENCRYPTION_KEY in repo Settings > Secrets and" \
                 "variables > Actions before this backup can run."
            exit 1
          fi
          command -v gpg >/dev/null || sudo apt-get install -y gnupg
          gpg --batch --yes --passphrase-fd 0 --pinentry-mode loopback \
              --symmetric --cipher-algo AES256 \
              -o "fullloop-$STAMP.dump.gpg" "fullloop-$STAMP.dump" <<< "$BACKUP_ENCRYPTION_KEY"
          rm -f "fullloop-$STAMP.dump"

      - name: Upload encrypted dump as GitHub artifact (offsite — different provider than Supabase)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fullloop-db-${{ env.STAMP }}
          path: fullloop-${{ env.STAMP }}.dump.gpg
          retention-days: 90
          if-no-files-found: error

      - name: Alert on failure (Telegram)
        # NOTE: the guard MUST live inside the run script, not in this step's
        # `if:` — a step's own env: block is not visible to its own if:
        # conditional (GitHub Actions evaluates if: before applying the
        # step's env), so `if: env.TG_TOKEN != ''` here would always be
        # false and this step would silently never fire, secrets or not.
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          # Item (196): this pointed at TELEGRAM_NOTIFY_CHAT_ID, a secret that has
          # never existed in this repo (verified via `gh secret list` — only
          # TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID are configured), so this alert
          # has silently no-op'd on every nightly failure since the workflow was
          # introduced. Aligned to TELEGRAM_CHAT_ID, the same secret ci.yml and
          # tenant-config-reconcile.yml already alert through successfully.
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ]; then
            echo "TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID not set — skipping alert."
            exit 0
          fi
          curl -sS --max-time 30 "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            -d text="🔴 FullLoop nightly DB backup FAILED — run: ${{ github.run_id }}. Check the Action log." || true
