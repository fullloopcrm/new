name: tenant-scope-guard

# Blocks any PR/push that introduces a query on a tenant-owned table without a
# tenant_id filter (and not a row-specific id lookup). Backstop for the fact
# that the app runs on the service_role client, which bypasses Postgres RLS.
# See platform/docs/tenant-isolation-rls-plan.md and scripts/audit-tenant-scope.mjs.

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: this workflow only reads the checkout and runs a Node audit
# script — it needs no write scopes on the repo, packages, or actions.
permissions:
  contents: read

# One in-flight run per ref; a newer push to the same PR cancels the older run
# so we don't burn runner minutes re-auditing a commit that's already stale.
concurrency:
  group: tenant-scope-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tenant-scope:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
      - name: Run tenant-scope guard
        working-directory: platform
        run: node scripts/audit-tenant-scope.mjs

  notify-failure:
    needs: tenant-scope
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Telegram alert on guard failure
        working-directory: ${{ github.workspace }}
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ]; then
            echo "TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID not set — skipping alert."
            exit 0
          fi
          TEXT="❌ tenant-scope-guard failed
          branch: ${{ github.ref_name }}
          commit: ${{ github.sha }}
          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            --data-urlencode text="$TEXT" \
            -d disable_web_page_preview=true >/dev/null || true
