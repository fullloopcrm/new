name: tenant-config-reconcile

# Read-only drift check over the sources that decide which domain renders
# which tenant (tenants.domain, tenant_domains, BESPOKE_SITE_TENANTS in
# middleware.ts, /site/<slug> folders) — the 2026-07-10 outage class. See
# scripts/reconcile-tenant-config.mjs for the full drift logic and the
# no-secret clean-skip contract this workflow verifies below.
#
# Runs on pull_request so it bites BEFORE merge, not only on main.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: tenant-config-reconcile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Contract check: with no Management-API token present, the script must
      # exit 0 cleanly (not fail) — otherwise a fork or secret-less branch
      # would red-gate on every PR. Forces an empty token and asserts the
      # script's own clean-skip marker, so a regression in that skip path
      # fails CI instead of silently masking (or losing) real drift checks.
      - name: Verify no-secret clean-skip contract
        working-directory: platform
        run: |
          OUTPUT=$(SUPABASE_ACCESS_TOKEN_FULLLOOP= node scripts/reconcile-tenant-config.mjs)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "skipping (exit 0)" || (echo "clean-skip contract broken — script no longer skips cleanly with no token" && exit 1)

      - name: Run tenant-config reconcile
        working-directory: platform
        env:
          SUPABASE_ACCESS_TOKEN_FULLLOOP: ${{ secrets.SUPABASE_ACCESS_TOKEN_FULLLOOP }}
        run: node scripts/reconcile-tenant-config.mjs

  notify-failure:
    needs: reconcile
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Telegram alert on reconcile drift
        working-directory: ${{ github.workspace }}
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ]; then
            echo "TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID not set — skipping alert."
            exit 0
          fi
          TEXT="❌ tenant-config-reconcile drift detected
          branch: ${{ github.ref_name }}
          commit: ${{ github.sha }}
          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            --data-urlencode text="$TEXT" \
            -d disable_web_page_preview=true >/dev/null || true
