name: tenant-config-reconcile

# Read-only drift gate over the sources that decide which domain renders which
# tenant's site: tenants.domain, tenant_domains (routing_mode/status/vercel_project),
# BESPOKE_SITE_TENANTS in src/middleware.ts, and the /site/<slug> folders. A CRIT
# finding (e.g. a domain the DB routes bespoke that middleware serves as the generic
# template — the 2026-07-10 outage class) fails the job. WARN/INFO do not block.
#
# The job needs the Supabase Management-API token (SUPABASE_ACCESS_TOKEN_FULLLOOP).
# The script token-guards: if the secret is absent it exits 0 cleanly, so forks and
# branches without the secret pass instead of erroring. See
# platform/scripts/reconcile-tenant-config.mjs.

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: this gate only reads the checkout (and, when the secret is
# present, issues read-only SELECTs to Supabase). It never needs write scopes.
permissions:
  contents: read

# One in-flight run per ref; a newer push to the same PR supersedes the old run.
concurrency:
  group: tenant-config-reconcile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      failed_step: ${{ steps.identify-failed-step.outputs.failed_step }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        id: checkout
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        id: setup-node
        with:
          node-version: '20'

      # Contract gate: with NO Management-API secret the script MUST exit 0
      # (skip green) so forks and secret-less branches are never red-gated by a
      # missing credential. Force an empty token AND an empty HOME (so the
      # ~/.env.local fallback cannot find one either) and assert the clean-skip
      # path fires. Runs first so a broken guard fails fast, before any real query.
      - name: Verify token-guard skips clean without a secret (no secret = green)
        id: verify-token-guard
        working-directory: platform
        env:
          SUPABASE_ACCESS_TOKEN_FULLLOOP: ''
        run: |
          export HOME="$(mktemp -d)"
          out="$(node scripts/reconcile-tenant-config.mjs)"
          echo "$out"
          echo "$out" | grep -q 'skipping (exit 0)' \
            || { echo '::error::reconcile did not clean-skip without a secret'; exit 1; }

      # Piped through `tee` + $GITHUB_STEP_SUMMARY (not a PR comment) so the
      # CRIT/WARN/INFO report is visible on the run's Job Summary page without
      # a log dive -- and, crucially, without any permission escalation: this
      # env var is a plain runner-local file, unlike posting a PR comment
      # (which would need a write-scoped pull-requests permission and break the
      # "read-only, never gains write scopes" invariant reconcile-gate-wiring.test.ts
      # locks in below). PIPESTATUS[0] preserves the real node exit code through the
      # tee pipe so the gate still fails on gating CRIT drift.
      - name: Reconcile tenant config (read-only drift gate)
        id: reconcile-drift-gate
        working-directory: platform
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN_FULLLOOP: ${{ secrets.SUPABASE_ACCESS_TOKEN_FULLLOOP }}
        run: |
          set +e
          node scripts/reconcile-tenant-config.mjs | tee reconcile-output.txt
          exit_code=${PIPESTATUS[0]}
          {
            echo '### Tenant-config reconcile'
            echo '```'
            cat reconcile-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$exit_code"

      - name: Identify which step failed (for the Telegram alert)
        id: identify-failed-step
        if: failure()
        run: |
          # Item (244)'s ci.yml fix, continued onto this lane's other gating job
          # (queue item (2): "continue whichever surface (1) opens up"). Same
          # problem: this job's own notify-failure alert (below) said only
          # "reconcile failed", leaving "the token-guard contract itself broke"
          # (a guard bug, not real tenant drift) indistinguishable from "the real
          # drift gate found gating CRIT" (an actual routing-config problem) --
          # the existing TEXT even said so explicitly ("check the run log to
          # tell which"). Same technique as ci.yml: every real step above now has
          # an `id:`, and this step (named with "Telegram" so
          # ci-gate-conditional-skip-guard.test.ts's ALERT_STEP_NAME_RE exemption
          # applies to it too) checks each one's outcome explicitly and publishes
          # the first failed one as a job output notify-failure reads.
          failed="unknown"
          [ "${{ steps.checkout.outcome }}" = "failure" ] && failed="Checkout"
          [ "${{ steps.setup-node.outcome }}" = "failure" ] && failed="Setup Node"
          [ "${{ steps.verify-token-guard.outcome }}" = "failure" ] && failed="Verify token-guard skips clean without a secret"
          [ "${{ steps.reconcile-drift-gate.outcome }}" = "failure" ] && failed="Reconcile tenant config (read-only drift gate)"
          echo "failed_step=$failed" >> "$GITHUB_OUTPUT"

  notify-failure:
    needs: reconcile
    if: failure()
    runs-on: ubuntu-latest
    # No long-running step here (one curl call), but the call reaches a
    # third-party API (api.telegram.org) with no bound of its own — see the
    # --max-time flag below. Without EITHER bound, a network hang here would
    # sit on the runner up to GitHub's 360-minute default job timeout instead
    # of failing fast.
    timeout-minutes: 5
    steps:
      - name: Telegram alert on reconcile failure
        working-directory: ${{ github.workspace }}
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ]; then
            echo "TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID not set — skipping alert."
            exit 0
          fi
          TEXT="❌ tenant-config-reconcile job FAILED
          failed step: ${{ needs.reconcile.outputs.failed_step }} (if the drift gate step itself, this is EITHER gating CRIT drift OR the script erroring — check the run log to tell which of those two)
          branch: ${{ github.ref_name }}
          commit: ${{ github.sha }}
          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s --max-time 30 -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            --data-urlencode text="$TEXT" \
            -d disable_web_page_preview=true >/dev/null || true
