version: 2
updates:
  # Keeps this repo's SHA-pinned GitHub Actions (checkout/setup-node/upload-artifact,
  # see deploy-prep/actions-sha-pinning-note.md) current via reviewed PRs. Dependabot
  # understands the `@<sha> # vX` pin format and bumps both the SHA and the comment,
  # closing the "pins rot without a human bumping them" gap that note called out.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
